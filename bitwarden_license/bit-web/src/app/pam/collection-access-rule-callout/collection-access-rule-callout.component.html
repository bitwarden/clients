@if (rules()[0]; as rule) {
  <bit-callout type="info" [title]="'pamCollectionAccessRuleCalloutTitle' | i18n">
    <span>{{ "pamCollectionAccessRuleCalloutBody" | i18n }}</span>
    <a
      bitLink
      linkType="primary"
      class="tw-ms-1"
      [routerLink]="['/organizations', organizationId(), 'pam', 'access-rules']"
      [queryParams]="{ accessRuleId: rule.id }"
      (click)="closeDialog()"
      >{{ rule.name }}</a
    >
    <span class="tw-ms-1 tw-text-muted">&middot;</span>
    <span class="tw-ms-1 tw-text-muted">{{ summary() }}</span>
  </bit-callout>
}
