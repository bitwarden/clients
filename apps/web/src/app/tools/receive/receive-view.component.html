<bit-dialog background="alt">
  <ng-container bitDialogTitle>{{ receive.name }}</ng-container>
  <ng-container bitDialogContent>
    <bit-section class="tw-mb-4">
      <bit-section-header class="tw-mt-2">
        <h2 bitTypography="h6">Receive Details</h2>
      </bit-section-header>
      <bit-card>
        <bit-form-field>
          <bit-label>{{ "receiveLink" | i18n }}</bit-label>
          <input bitInput disabled type="text" [value]="receiveLink()" />
          <button
            type="button"
            bitIconButton="bwi-clone"
            bitSuffix
            [label]="'copyLink' | i18n"
            (click)="copyLink()"
          ></button>
        </bit-form-field>
        <dl>
          <dt bitTypography="body2" class="tw-text-muted">{{ "expiration" | i18n }}</dt>
          <dd>{{ receive.expirationDate | date: "medium" }}</dd>
        </dl>
      </bit-card>
    </bit-section>

    <app-receive-files-view [receiveView]="receive"></app-receive-files-view>
  </ng-container>
  <ng-container bitDialogFooter>
    <button type="button" bitButton buttonType="primary" (click)="openEdit()">
      {{ "edit" | i18n }}
    </button>
    <button type="button" bitButton buttonType="secondary" bitDialogClose>
      {{ "close" | i18n }}
    </button>
  </ng-container>
</bit-dialog>
