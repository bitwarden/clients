<ng-template>
  <section
    cdkTrapFocus
    cdkTrapFocusAutoCapture
    class="tw-relative"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="title()"
    [class.bit-popover-has-header]="headerSlot()"
  >
    <div class="tw-overflow-hidden tw-rounded-xl tw-shadow-lg">
      <div
        class="tw-relative tw-z-20 tw-w-[352px] tw-break-words tw-bg-background tw-p-6 tw-text-fg-body tw-border tw-border-solid tw-border-border-base"
        [class.tw-pb-4]="!footerSlot()"
      >
        @if (headerSlot()) {
          <div
            class="tw-h-[160px] tw-w-full tw-bg-bg-secondary tw-flex tw-items-center tw-justify-center tw-overflow-hidden"
          >
            <ng-content select="[slot='header']"></ng-content>
          </div>
        }
        <span class="tw-absolute tw-top-2 tw-right-2">
          <button
            type="button"
            bitIconButton="bwi-close"
            [label]="'close' | i18n"
            (click)="closed.emit()"
            size="small"
          ></button>
        </span>
        <span class="tw-font-medium tw-text-fg-heading">{{ title() }}</span>
        <span class="">
          <ng-content></ng-content>
        </span>
        @if (footerSlot()) {
          <div class="tw-flex tw-items-center">
            <ng-content select="[slot='footer']"></ng-content>
          </div>
        }
      </div>
    </div>
    <div class="bit-popover-arrow"></div>
  </section>
</ng-template>
