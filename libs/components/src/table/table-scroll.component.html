<cdk-virtual-scroll-viewport
  bitScrollLayout
  [itemSize]="rowSize()"
  [ngStyle]="{ paddingBottom: headerHeight + 'px' }"
>
  <table [ngClass]="tableClass">
    <thead
      class="tw-border-0 tw-border-b-2 tw-border-solid tw-border-secondary-300 tw-font-medium tw-text-muted"
    >
      <tr>
        <ng-content select="[header]"></ng-content>
      </tr>
    </thead>
    <tbody>
      <tr
        class="has-[input[type=checkbox]:checked]:tw-bg-bg-brand-soft has-[input[type=checkbox]:hover]:tw-bg-bg-brand-softer has-[input[type=checkbox]:focus-visible]:tw-bg-bg-brand-softer"
        *cdkVirtualFor="let r of rows$; trackBy: trackBy(); templateCacheSize: 0"
        bitRow
      >
        <ng-container
          *ngTemplateOutlet="rowDef().template; context: { $implicit: r }"
        ></ng-container>
      </tr>
    </tbody>
  </table>
</cdk-virtual-scroll-viewport>
