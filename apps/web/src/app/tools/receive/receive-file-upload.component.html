<div class="tw-mb-4">
  @if (receiveName()) {
    <p class="tw-text-center">
      <b>{{ receiveName() }}</b>
    </p>
  }
  @if (ownerEmail()) {
    <p class="tw-text-center tw-mb-0">{{ ownerEmail() + " " }}{{ "sentYouThisRequest" | i18n }}</p>
  }
</div>
@if (showFileUploadResult()) {
  Files successfully uploaded: {{ filesUploaded() }}
} @else {
  <bit-file-upload
    [maxFileSize]="maxFileSize"
    [multiple]="multiple"
    [accept]="accept"
    [hasError]="hasError()"
    [(files)]="files"
  >
    <bit-label></bit-label>
    <bit-hint></bit-hint>
  </bit-file-upload>
  @if (files().length > 0) {
    <div class="tw-flex tw-flex-row tw-items-center tw-gap-2 tw-mt-4">
      <button bitButton type="button" buttonType="primary" (click)="uploadFiles()">
        {{ "upload" | i18n }}
      </button>
      <button bitButton type="button" buttonType="secondary" (click)="removeFiles()">
        {{ "cancel" | i18n }}
      </button>
    </div>
  }
}
