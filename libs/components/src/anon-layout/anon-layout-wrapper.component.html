<auth-anon-layout
  [title]="pageTitle"
  [subtitle]="pageSubtitle"
  [icon]="pageIcon"
  [showReadonlyHostname]="showReadonlyHostname"
  [maxWidth]="maxWidth"
  [hideCardWrapper]="hideCardWrapper"
  [hideBackgroundIllustration]="hideBackgroundIllustration"
  [showPageIcon]="showPageIcon ?? true"
  [contentTopPadding]="contentTopPadding ?? 'default'"
  [heroAlignment]="heroAlignment ?? 'center'"
  [secondaryContentLocation]="secondaryContentLocation ?? 'main'"
>
  <router-outlet slot="header-actions" name="header-actions"></router-outlet>
  <router-outlet></router-outlet>
  <router-outlet slot="secondary" name="secondary"></router-outlet>
  <router-outlet slot="environment-selector" name="environment-selector"></router-outlet>
</auth-anon-layout>
