<popup-page [disablePadding]="true">
  <popup-header
    slot="header"
    [background]="'alt'"
    [showBackButton]="showBackButton"
    [pageTitle]="''"
  >
    <div class="tw-w-32">
      <bit-svg *ngIf="showLogo" [content]="logo" [ariaLabel]="'appLogoLabel' | i18n"></bit-svg>
    </div>

    <ng-container slot="end">
      <app-pop-out></app-pop-out>
      <app-current-account *ngIf="showAcctSwitcher && hasLoggedInAccount"></app-current-account>
    </ng-container>
  </popup-header>

  @if (leftAlignHeader && pageTitle) {
    <div class="tw-p-6">
      <h1 class="tw-mb-0 tw-text-left tw-text-2xl tw-font-semibold tw-text-main">
        {{ pageTitle }}
      </h1>
      @if (pageSubtitle) {
        <p class="tw-mt-6 tw-mb-0 tw-text-left tw-text-sm tw-text-muted">{{ pageSubtitle }}</p>
      }
    </div>
  }

  <auth-anon-layout
    [title]="leftAlignHeader ? null : pageTitle"
    [subtitle]="leftAlignHeader ? null : pageSubtitle"
    [icon]="pageIcon"
    [showReadonlyHostname]="showReadonlyHostname"
    [hideLogo]="true"
    [maxWidth]="maxWidth"
    [hideFooter]="hideFooter"
    [hideCardWrapper]="hideCardWrapper"
  >
    <router-outlet></router-outlet>
    <router-outlet slot="secondary" name="secondary"></router-outlet>
    <router-outlet slot="environment-selector" name="environment-selector"></router-outlet>
  </auth-anon-layout>
</popup-page>
