<ng-template>
  <section
    cdkTrapFocus
    cdkTrapFocusAutoCapture
    class="tw-relative"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="title() || null"
  >
    <div
      class="tw-overflow-hidden tw-rounded-xl tw-shadow-lg tw-border tw-border-solid tw-border-border-base"
    >
      <div class="tw-relative tw-z-20 tw-max-w-80 tw-break-words tw-bg-background tw-text-fg-body">
        <div
          class="empty:tw-hidden tw-p-2 tw-pb-0 tw-overflow-hidden tw-rounded-lg [img]:tw-w-full"
        >
          <ng-content select="[slot=media]"></ng-content>
        </div>
        <div class="tw-p-6">
          <div class="tw-absolute tw-top-2 tw-right-2">
            <button
              type="button"
              bitIconButton="bwi-close"
              [label]="'close' | i18n"
              (click)="closed.emit()"
              size="small"
            ></button>
          </div>
          <div class="tw-flex tw-flex-col tw-gap-6">
            <div class="tw-flex tw-flex-col tw-gap-3">
              <div bitTypography="h4" noMargin class="tw-text-fg-heading">
                {{ title() }}
              </div>
              <span bitTypography="body2" class="tw-text-fg-body">
                <ng-content></ng-content>
              </span>
            </div>
            <div class="empty:tw-hidden">
              <ng-content select="[slot=footer]"></ng-content>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="bit-popover-arrow"></div>
  </section>
</ng-template>
