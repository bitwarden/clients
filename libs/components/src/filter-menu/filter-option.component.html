<button
  type="button"
  [attr.role]="multiple() ? 'menuitemcheckbox' : 'menuitemradio'"
  [attr.aria-checked]="selected()"
  [disabled]="disabled()"
  [hidden]="hidden()"
  (click)="toggle()"
  [class]="buttonClasses"
>
  <!-- Selection indicator: a check for checkbox options, a filled dot for radio. -->
  <span
    class="tw-flex tw-size-4 tw-flex-none tw-items-center tw-justify-center tw-border tw-border-solid tw-border-border-base"
    [class.tw-rounded]="multiple()"
    [class.tw-rounded-full]="!multiple()"
    [class.tw-bg-primary-600]="multiple() && selected()"
    [class.tw-border-primary-600]="selected()"
  >
    @if (selected()) {
      @if (multiple()) {
        <bit-icon
          name="bwi-check"
          class="tw-text-xs tw-text-contrast"
          aria-hidden="true"
        ></bit-icon>
      } @else {
        <span class="tw-size-1.5 tw-rounded-full tw-bg-primary-600"></span>
      }
    }
  </span>

  <span #label class="tw-min-w-0 tw-flex-1 tw-truncate"><ng-content></ng-content></span>

  @if (count() != null) {
    <span class="tw-flex-none tw-text-muted">{{ count() }}</span>
  }
</button>
