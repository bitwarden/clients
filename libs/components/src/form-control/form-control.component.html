<label
  class="tw-transition tw-items-start tw-gap-2 tw-select-none tw-mb-0 tw-inline-flex tw-rounded has-[:focus-visible]:tw-ring has-[:focus-visible]:tw-ring-border-focus"
  [class.tw-cursor-auto]="base.formControl().disabled"
  [class.tw-cursor-pointer]="!base.formControl().disabled"
>
  <ng-content></ng-content>
  <!-- minor padding adjustment for visual alignment -->
  <span
    class="tw-inline-flex tw-flex-col tw-pt-px"
    [class.tw-text-fg-inactive]="base.formControl().disabled"
    [class.tw-text-fg-heading]="!base.formControl().disabled"
  >
    <span bitTypography="body2" class="tw-leading-5 tw-font-medium">
      <ng-content select="bit-label"></ng-content>
      @if (base.required) {
        <span class="tw-text-xs tw-font-normal"> ({{ "required" | i18n }})</span>
      }
    </span>
    @if (!base.hasError) {
      <span class="[&_bit-hint]:tw-mt-0 tw-leading-none">
        <ng-content select="bit-hint"></ng-content>
      </span>
    }
  </span>
</label>
@if (base.hasError) {
  <div class="tw-mt-1 tw-text-danger tw-text-xs tw-ms-0.5">
    <bit-icon name="bwi-error" /> {{ base.displayError }}
  </div>
}
