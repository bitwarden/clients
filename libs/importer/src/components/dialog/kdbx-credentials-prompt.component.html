<form [formGroup]="formGroup" [bitSubmit]="submit" bit-dialog>
  <span bitDialogTitle>
    {{ "importKdbxCredentialsTitle" | i18n }}
  </span>

  <div bitDialogContent>
    {{ "importKdbxCredentialsDesc" | i18n }}
    <bit-form-field class="tw-mt-6">
      <bit-label>{{ "confirmFilePassword" | i18n }}</bit-label>
      <input bitInput type="password" formControlName="password" appAutofocus appInputVerbatim />
      <button type="button" bitSuffix bitIconButton bitPasswordInputToggle></button>
    </bit-form-field>

    <label class="tw-mb-1 tw-mt-4 tw-block tw-font-bold" for="kdbx_keyfile">
      {{ "importKdbxKeyFile" | i18n }}
    </label>
    <input id="kdbx_keyfile" type="file" (change)="setKeyFile($event)" />
    @if (keyFileName(); as name) {
      <span class="tw-mt-1 tw-block tw-text-sm tw-text-muted">{{ name }}</span>
    }
  </div>

  <ng-container bitDialogFooter>
    <button bitButton buttonType="primary" type="submit">
      <span>{{ "importVerb" | i18n }}</span>
    </button>
    <button bitButton bitDialogClose buttonType="secondary" type="button">
      <span>{{ "cancel" | i18n }}</span>
    </button>
  </ng-container>
</form>
