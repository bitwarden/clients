<div
  [class]="
    'tw-inline-flex tw-min-w-0 tw-w-full tw-max-w-full tw-items-center tw-justify-between ' +
    gapClass()
  "
>
  <ng-content select="[slot=chipStart]"></ng-content>

  @if (startIcon()) {
    <bit-icon [name]="startIcon()" class="tw-text-base/5" />
  }

  <span class="tw-text-left tw-truncate tw-leading-5 tw-min-w-0 tw-flex-1">
    <ng-content></ng-content>
  </span>

  @if (endIcon() && !dismissible()) {
    <bit-icon [name]="endIcon()" class="tw-text-base/5" />
  }
</div>

<ng-content select="[slot=chipEnd]"></ng-content>
