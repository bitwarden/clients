<div
  class="tw-flex tw-gap-3 tw-bg-clip-padding tw-border-solid tw-border-b tw-border-0 tw-min-h-14 tw-p-4"
  [class]="bannerClass()"
  [attr.role]="useAlertRole() ? 'status' : null"
  [attr.aria-live]="useAlertRole() ? 'polite' : null"
>
  <div class="tw-flex tw-flex-1 tw-gap-3" [class]="alignClass()">
    @if (displayIcon(); as icon) {
      <!-- Two icon tiles are needed here because `size` is a TypeScript input — it can't change in
           response to a CSS container query. We use two elements with opposing visibility classes
           to swap between base and lg at the @5xl breakpoint. -->
      <bit-icon-tile
        [icon]="icon"
        [variant]="variant()"
        size="base"
        [class]="showActions() ? '@5xl:tw-hidden' : ''"
        aria-hidden="true"
      />
      @if (showActions()) {
        <bit-icon-tile
          [icon]="icon"
          [variant]="variant()"
          size="lg"
          class="tw-hidden @5xl:tw-block"
          aria-hidden="true"
        />
      }
    }
    <div
      class="tw-flex tw-flex-col @5xl:tw-flex-row @5xl:tw-items-center tw-gap-1 @5xl:tw-gap-3 tw-min-w-0"
      [class]="showActions() ? '@5xl:tw-flex-1' : ''"
    >
      <div
        class="tw-flex tw-flex-col tw-gap-1 tw-min-w-0"
        [class]="showActions() ? '@5xl:tw-flex-1' : ''"
      >
        <div bitTypography="h4" noMargin class="tw-leading-6">
          <ng-content select="[bitBannerTitle]"></ng-content>
        </div>
        <span bitTypography="body2">
          <ng-content></ng-content>
        </span>
      </div>
      @if (showActions()) {
        <div class="tw-flex tw-gap-3 tw-items-center tw-shrink-0 tw-mt-3 @5xl:tw-mt-0">
          <ng-content select="[slot='actions']"></ng-content>
        </div>
      }
    </div>
  </div>

  @if (showClose()) {
    <button
      type="button"
      bitIconButton="bwi-close"
      buttonType="primaryGhost"
      size="small"
      (click)="onClose.emit()"
      [label]="'close' | i18n"
    ></button>
  }
</div>
