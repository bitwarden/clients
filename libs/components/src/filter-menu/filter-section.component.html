@if (collapsible()) {
  <button
    type="button"
    class="tw-flex tw-w-full tw-items-center tw-gap-2 tw-border-none tw-bg-transparent tw-px-3 tw-py-1.5 tw-text-start tw-text-sm tw-font-semibold tw-text-main hover:tw-bg-secondary-100 focus-visible:tw-z-10 focus-visible:tw-outline-none focus-visible:tw-ring-2 focus-visible:tw-ring-inset focus-visible:tw-ring-border-focus"
    [attr.aria-expanded]="open()"
    (click)="toggle()"
  >
    <bit-icon
      [name]="open() ? 'bwi-angle-up' : 'bwi-angle-down'"
      class="tw-flex-none tw-text-muted"
      aria-hidden="true"
    ></bit-icon>
    <span class="tw-min-w-0 tw-flex-1 tw-truncate">{{ label() }}</span>
    <bit-berry [value]="selectedCount()"></bit-berry>
  </button>
} @else {
  <div
    class="tw-flex tw-items-center tw-gap-2 tw-px-3 tw-py-1.5 tw-text-sm tw-font-semibold tw-text-muted"
  >
    <span class="tw-min-w-0 tw-flex-1 tw-truncate">{{ label() }}</span>
    <bit-berry [value]="selectedCount()"></bit-berry>
  </div>
}

@if (open()) {
  <div><ng-content></ng-content></div>
}
