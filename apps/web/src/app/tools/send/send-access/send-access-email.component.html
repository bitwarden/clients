@if (!enterOtp()) {
  <bit-form-field>
    <bit-label>{{ "email" | i18n }}</bit-label>
    <input bitInput type="text" [formControl]="email" required appInputVerbatim appAutofocus />
  </bit-form-field>
  <div class="tw-flex">
    <button
      bitButton
      bitFormButton
      type="submit"
      buttonType="primary"
      [loading]="loading()"
      [disabled]="!validateEmail()"
      [block]="true"
    >
      <span>{{ "sendCode" | i18n }} </span>
    </button>
  </div>
} @else {
  <bit-form-field>
    <bit-label>{{ "verificationCode" | i18n }}</bit-label>
    <input
      bitInput
      type="text"
      [formControl]="otp"
      appInputVerbatim
      appAutofocus
      (blur)="onOtpBlur()"
    />
  </bit-form-field>
  <a bitLink type="button" (click)="onResendCode()" class="tw-mb-3 tw-inline-block">
    {{ "resendCode" | i18n }}
  </a>
  <button
    bitButton
    bitFormButton
    type="submit"
    buttonType="primary"
    [loading]="loading()"
    [block]="true"
    [disabled]="!otp?.value"
    class="tw-mb-3"
  >
    <span>{{ "viewSend" | i18n }} </span>
  </button>
  <button bitButton type="button" buttonType="secondary" [block]="true" (click)="onBackClick()">
    <span>{{ "back" | i18n }}</span>
  </button>
}
