@if (label()) {
  <fieldset class="tw-border-none tw-m-0 tw-p-0 tw-flex-col tw-gap-2">
    <legend class="tw-block">
      <ng-content select="bit-label"></ng-content>
    </legend>
    <ng-container *ngTemplateOutlet="cardStack"></ng-container>
  </fieldset>
}

@if (!label()) {
  <ng-container *ngTemplateOutlet="cardStack"></ng-container>
}

<ng-template #cardStack>
  <div class="tw-flex tw-flex-col tw-gap-2 [&_bit-form-control-card]:!tw-mb-0">
    <ng-content></ng-content>
  </div>
  <div class="tw-mt-2">
    <ng-content select="bit-hint"></ng-content>
  </div>
</ng-template>
