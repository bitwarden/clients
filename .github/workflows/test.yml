name: Client Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  ci:
    name: PQP Tests & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: https://npm.pkg.github.com
          scope: '@ovrlab'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare coverage directory
        run: mkdir -p coverage

      - name: Run PQP tests with coverage
        env:
          FORCE_COLOR: 0
        run: |
          set -o pipefail
          npx jest --config test/jest.config.js 2>&1 | tee coverage/coverage-comment.txt

      - name: Verify coverage file exists
        if: github.event_name == 'pull_request'
        run: |
          echo "Checking for coverage file..."
          ls -la coverage/
          if [ -f coverage/coverage-comment.txt ]; then
            echo "Coverage file found:"
            head -n 30 coverage/coverage-comment.txt
          else
            echo "ERROR: Coverage file not found!"
            exit 1
          fi

      - name: Comment coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          COVERAGE_PATH: coverage/coverage-comment.txt
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = require('./.github/scripts/post-coverage-comment.js');
            await run({ github, context, core });

      - name: Fetch base branch for coverage comparison
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1

      - name: Run coverage on base branch
        if: github.event_name == 'pull_request'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git worktree add ../base-worktree origin/${{ github.event.pull_request.base.ref }}
          pushd ../base-worktree
          npm ci
          mkdir -p coverage
          set -o pipefail
          npx jest --config test/jest.config.js 2>&1 | tee coverage/base-coverage-comment.txt
          popd
          cp ../base-worktree/coverage/coverage-summary.json coverage/base-coverage-summary.json
          git worktree remove --force ../base-worktree

      - name: Compare coverage with base branch
        if: github.event_name == 'pull_request'
        env:
          BASE_COVERAGE_PATH: coverage/base-coverage-summary.json
          HEAD_COVERAGE_PATH: coverage/coverage-summary.json
          COVERAGE_METRIC: lines
          COVERAGE_TOLERANCE: 2
        run: node .github/scripts/compare-coverage.js