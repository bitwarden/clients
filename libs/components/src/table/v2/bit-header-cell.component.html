<ng-template #content>
  <ng-content></ng-content>
</ng-template>

@if (sortable()) {
  <button
    type="button"
    [class]="sortButtonClasses"
    [attr.aria-pressed]="active()"
    (click)="onSortClick()"
  >
    <ng-container *ngTemplateOutlet="content"></ng-container>
    <i class="bwi tw-ms-2" [class]="sortIcon()"></i>
  </button>
} @else {
  <ng-container *ngTemplateOutlet="content"></ng-container>
}
