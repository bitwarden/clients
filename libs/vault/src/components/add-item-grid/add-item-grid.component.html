<ul class="tw-grid tw-grid-cols-1 md:tw-grid-cols-2 tw-gap-4 tw-list-none tw-p-0 tw-m-0">
  @for (item of items(); track item.labelKey) {
    <li>
      <button
        type="button"
        (click)="item.action()"
        class="tw-w-full tw-flex tw-items-center tw-gap-4 tw-rounded-xl tw-border tw-border-solid tw-border-border-base tw-bg-bg-primary tw-py-3 tw-px-4 tw-text-left hover:tw-bg-bg-brand-softer hover:tw-border-bg-brand-soft focus-visible:tw-outline-none focus-visible:tw-bg-bg-brand-softer focus-visible:tw-border-border-focus"
      >
        <bit-icon-tile [icon]="item.icon" [variant]="'primary'" [size]="'base'"></bit-icon-tile>
        <div class="tw-flex-1">
          <div bitTypography="h6" class="!tw-mb-0.5">
            {{ item.labelKey | i18n }}
          </div>
          <div class="tw-text-sm tw-text-muted">{{ item.subtitleKey | i18n }}</div>
        </div>
        <bit-icon name="bwi-angle-right" class="tw-text-main bwi-lg" />
      </button>
    </li>
  }
</ul>
