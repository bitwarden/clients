<div class="tw-flex tw-flex-col tw-items-center tw-py-1">
  <div class="tw-relative tw-mx-auto tw-w-[150px] tw-h-[130px]">
    <canvas
      #chartCanvas
      class="tw-absolute tw-inset-0 tw-block tw-w-full tw-h-full"
      [attr.aria-label]="'outOfPasswords' | i18n: total()"
      role="img"
    ></canvas>
    <div
      class="tw-absolute tw-inset-x-0 tw-top-[58%] tw--translate-y-1/2 tw-flex tw-flex-col tw-items-center tw-leading-none"
    >
      <span
        class="tw-font-bold tw-text-2xl"
        [class.tw-text-success]="isHealthy()"
        [class.tw-text-danger]="!isHealthy()"
      >
        {{ percent() }}%
      </span>
      <span bitTypography="helper" class="tw-mt-1 tw-text-main">
        {{ (isHealthy() ? "secure" : "atRisk") | i18n }}
      </span>
    </div>
  </div>
</div>
