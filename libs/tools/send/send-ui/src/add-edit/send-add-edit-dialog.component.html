<bit-dialog #dialog dialogSize="large" background="alt">
  <span bitDialogTitle>
    {{ headerText() | i18n }}
  </span>
  @if (showGenerator()) {
    <button
      bitDialogHeaderEnd
      type="button"
      bitIconButton="bwi-close"
      buttonType="primaryGhost"
      size="default"
      [label]="'close' | i18n"
      (click)="closeGenerator()"
    ></button>
  }
  <span bitDialogContent>
    @if (showGenerator()) {
      <vault-cipher-form-generator
        type="password"
        (valueGenerated)="onValueGenerated($event)"
        (algorithmSelected)="onAlgorithmSelected($event)"
        disableMargin
      ></vault-cipher-form-generator>
    }
    <div [hidden]="showGenerator()">
      @if (disableForm) {
        <bit-callout type="info" [title]="'sendNotCompliantWithYourOrgsPolicy' | i18n">
          <div>{{ "sendDisabledNonCompliantBannerMessage" | i18n }}</div>
          <button class="tw-mt-4" type="button" bitButton buttonType="primary" (click)="makeCopy()">
            {{ "makeACopy" | i18n }}
          </button>
        </bit-callout>
      }
      <tools-send-form
        formId="sendForm"
        [config]="config"
        (onSendCreated)="onSendCreated($event)"
        (onSendUpdated)="onSendUpdated($event)"
        (openPasswordGenerator)="openGenerator()"
        [editing]="editing()"
        [submitBtn]="submitBtn()"
      >
      </tools-send-form>
    </div>
  </span>

  <ng-container bitDialogFooter>
    @if (showGenerator()) {
      <button
        type="button"
        bitButton
        buttonType="primary"
        (click)="useGeneratedPassword()"
        [disabled]="!(generatorButtonLabel() && generatedValue())"
      >
        {{ generatorButtonLabel() }}
      </button>
      <button bitButton type="button" buttonType="secondary" (click)="closeGenerator()">
        {{ "cancel" | i18n }}
      </button>
    } @else {
      @if (disableForm) {
        <button type="button" bitButton buttonType="primary" (click)="makeCopy()">
          {{ "makeACopy" | i18n }}
        </button>
      } @else {
        @if (editing()) {
          <button bitButton type="submit" form="sendForm" buttonType="primary" #submitBtn>
            {{ "save" | i18n }}
          </button>
          <button bitButton type="button" buttonType="secondary" (click)="cancelEditSend()">
            {{ "cancel" | i18n }}
          </button>
        } @else {
          <button bitButton type="button" buttonType="secondary" (click)="editSend()">
            {{ "edit" | i18n }}
          </button>
        }
      }
      @if (config?.mode !== "add") {
        <div class="tw-ml-auto">
          <button
            type="button"
            buttonType="dangerGhost"
            slot="end"
            bitIconButton="bwi-trash"
            [bitAction]="deleteSend"
            label="{{ 'delete' | i18n }}"
          ></button>
        </div>
      }
    }
  </ng-container>
</bit-dialog>
