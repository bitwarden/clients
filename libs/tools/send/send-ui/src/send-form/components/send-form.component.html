<form [id]="formId()" [formGroup]="sendFormService.sendForm()" [bitSubmit]="submit">
  @if (!loading) {
    @if (sendDisabled()) {
      <bit-callout type="warning" [title]="'sendDisabledBannerTitle' | i18n">
        {{ "sendDisabledBannerMessage" | i18n }}
      </bit-callout>
    }
    <tools-send-details
      [config]="config"
      [originalSendView]="originalSendView"
      (openPasswordGenerator)="openPasswordGenerator.emit()"
    ></tools-send-details>
  }
</form>
