<form
  bitFieldContainer
  [size]="size()"
  role="search"
  class="tw-relative tw-items-center tw-w-full"
  (mouseenter)="isFormHovered.set(true)"
  (mouseleave)="isFormHovered.set(false)"
>
  <label class="tw-sr-only" [for]="id">{{ "search" | i18n }}</label>
  <label
    [for]="id"
    aria-hidden="true"
    class="tw-absolute tw-start-2 tw-z-20 !tw-mb-0 tw-cursor-text"
  >
    <i class="bwi bwi-search bwi-fw tw-text-muted"></i>
  </label>
  <input
    #input
    [type]="inputType"
    [id]="id"
    [placeholder]="placeholder() ?? ('search' | i18n)"
    class="tw-block tw-size-full tw-bg-transparent tw-text-fg-heading tw-placeholder-fg-body-subtle tw-border-none focus:tw-outline-none [&:disabled]:tw-bg-bg-secondary [&:disabled]:!tw-placeholder-fg-inactive [&:disabled]:!tw-text-fg-inactive tw-ps-9 tw-px-1"
    name="searchText"
    [ngModel]="searchText"
    (ngModelChange)="onChange($event)"
    (focus)="isInputFocused.set(true)"
    (blur)="isInputFocused.set(false); onTouch()"
    [disabled]="disabled()"
    [attr.autocomplete]="autocomplete()"
  />
  <button
    *ngIf="searchText"
    [ngClass]="{
      'tw-opacity-0': !showResetButton(),
      'tw-bg-text-muted': showResetButton(),
    }"
    class="bw-reset-btn tw-size-6 tw-absolute hover:tw-bg-text-main tw-end-2 tw-z-20 !tw-mb-0 tw-cursor-pointer"
    type="reset"
    [attr.aria-label]="'resetSearch' | i18n"
    (click)="clearSearch()"
    (focus)="isResetButtonFocused.set(true)"
    (blur)="isResetButtonFocused.set(false)"
  ></button>
</form>
