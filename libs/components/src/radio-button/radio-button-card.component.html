<bit-form-control-card disableMargin>
  <input
    type="radio"
    bitRadio
    [id]="base.inputId"
    [disabled]="base.groupDisabled || base.disabled()"
    [value]="base.value()"
    [checked]="base.selected"
    (change)="onInputChange()"
    (blur)="onBlur()"
  />
  <ng-content select="bit-label" ngProjectAs="bit-label"></ng-content>
  <ng-content select="bit-hint" ngProjectAs="bit-hint"></ng-content>
</bit-form-control-card>
