<bit-chip-content dismissible [startIcon]="startIcon()" [size]="baseChip.size()">
  {{ label() }}
  <!-- Dismiss button -->
  <button
    bitChipDismissButton
    chipEnd
    type="button"
    [attr.aria-label]="'removeItem' | i18n: label()"
    [disabled]="baseChip.disabled()"
    (click)="handleDismiss($event)"
  ></button>
</bit-chip-content>
