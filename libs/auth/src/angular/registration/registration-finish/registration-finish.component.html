<div
  class="tw-flex tw-flex-col tw-items-center tw-justify-center tw-gap-4"
  *ngIf="loading || pqpAutoSubmitting"
>
  <i class="bwi bwi-spinner bwi-spin bwi-3x" aria-hidden="true"></i>
  <p *ngIf="pqpAutoSubmitting" class="tw-text-center tw-text-muted">Creating your account...</p>
</div>

<auth-input-password
  [hidden]="loading || pqpAutoSubmitting"
  [email]="email"
  [flow]="inputPasswordFlow"
  [masterPasswordPolicyOptions]="masterPasswordPolicyOptions"
  [loading]="submitting"
  [primaryButtonText]="{ key: 'createAccount' }"
  (onPasswordFormSubmit)="handlePasswordFormSubmit($event)"
></auth-input-password>
