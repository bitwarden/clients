<aside
  class="tw-border tw-border-solid tw-rounded-xl tw-ps-4 tw-pe-2 tw-flex tw-flex-col tw-relative"
  [class]="calloutClass()"
  [attr.aria-labelledby]="titleId"
>
  @let title = titleComputed();
  @let icon = iconComputed();

  <ng-template #contentTpl>
    <ng-content />
  </ng-template>

  <div class="tw-flex tw-flex-col tw-gap-2">
    <div class="tw-flex tw-justify-between">
      <div class="tw-flex tw-gap-2 tw-items-center">
        @if (icon) {
          <i class="bwi tw-relative" [class]="icon" aria-hidden="true"></i>
        }
        @if (title) {
          <header [id]="titleId" class="tw-text-base tw-font-medium">
            <ng-content select="[slot=title]" />
            {{ title }}
          </header>
        } @else {
          <div bitTypography="body2">
            <ng-container *ngTemplateOutlet="contentTpl"></ng-container>
          </div>
        }
      </div>
      @if (!persistent()) {
        <button
          type="button"
          bitIconButton="bwi-close"
          size="small"
          (click)="handleDismiss()"
          [class]="fgClass()"
          [label]="'close' | i18n"
        ></button>
      }
    </div>
    @if (title) {
      <div bitTypography="body2">
        <ng-container *ngTemplateOutlet="contentTpl"></ng-container>
      </div>
    }
  </div>
  <div class="[&>*]:tw-flex [&>*]:tw-gap-3 [&>*]:tw-mt-4">
    <ng-content select="[slot=end]" />
  </div>
</aside>
