@if (showBanner()) {
  <bit-banner [title]="notificationData()?.header" (dismiss)="close()">
    {{ notificationData()?.description }}
    @if (notificationData()?.buttonText) {
      <ng-container slot="actions">
        <button bitButton type="button" buttonType="primary" (click)="close()">
          {{ notificationData()?.buttonText }}
        </button>
      </ng-container>
    }
  </bit-banner>
}
