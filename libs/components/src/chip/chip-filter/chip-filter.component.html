<!-- removing padding here and adding it to the button for proper menu alignment -->
<div class="!tw-ps-0 !tw-pb-0" bitBaseChip [variant]="!selectedOption ? 'subtle' : 'primary'">
  <bit-chip-content [size]="size()">
    <!-- Primary button -->
    <button
      bitChipContent
      [startIcon]="icon"
      [endIcon]="
        !selectedOption ? (menuTrigger.isOpen ? 'bwi-angle-up' : 'bwi-angle-down') : undefined
      "
      type="button"
      class="tw-truncate tw-bg-transparent hover:tw-bg-transparent tw-border-none tw-outline-none tw-w-full tw-truncate tw-text-[color:inherit] tw-text-[length:inherit]"
      [class.tw-ps-1.5]="size() === 'small'"
      [class.tw-ps-2]="size() === 'large'"
      [class.tw-pb-0.5]="size() === 'small'"
      [class.tw-pb-1]="size() === 'large'"
      [class.tw-cursor-not-allowed]="disabled()"
      data-fvw-target
      [bitMenuTriggerFor]="menu"
      [disabled]="disabled()"
      [title]="label"
      #menuTrigger="menuTrigger"
      (click)="setMenuWidth()"
      #chipSelectButton
    >
      <span class="tw-block tw-truncate tw-min-w-0">{{ label }}</span>
    </button>
    @if (selectedOption) {
      <!-- Close button -->
      <button
        bitChipDismissButton
        chipEnd
        type="button"
        [attr.aria-label]="'removeItem' | i18n: label"
        [disabled]="disabled()"
        (click)="clear()"
      ></button>
    }
  </bit-chip-content>
</div>

<bit-menu #menu (closed)="handleMenuClosed()">
  @if (renderedOptions) {
    <div
      class="tw-max-h-80 tw-min-w-32 tw-max-w-80 tw-text-sm"
      [ngStyle]="menuWidth && { width: menuWidth + 'px' }"
    >
      @if (getParent(renderedOptions); as parent) {
        <button
          type="button"
          bitMenuItem
          (click)="viewOption(parent, $event)"
          class="tw-text-[length:inherit]"
          [title]="'backTo' | i18n: parent.label ?? placeholderText()"
        >
          <i slot="start" class="bwi bwi-angle-left" aria-hidden="true"></i>
          {{ "backTo" | i18n: parent.label ?? placeholderText() }}
        </button>
        <button
          type="button"
          bitMenuItem
          (click)="selectOption(renderedOptions, $event)"
          [title]="'viewItemsIn' | i18n: renderedOptions.label"
          class="tw-text-[length:inherit]"
        >
          <i slot="start" class="bwi bwi-list" aria-hidden="true"></i>
          {{ "viewItemsIn" | i18n: renderedOptions.label }}
        </button>
      }
      @for (option of renderedOptions.children; track option) {
        <button
          type="button"
          bitMenuItem
          (click)="
            option.children?.length ? viewOption(option, $event) : selectOption(option, $event)
          "
          [disabled]="option.disabled"
          [title]="option.label"
          class="tw-text-[length:inherit]"
          [attr.aria-haspopup]="option.children?.length ? 'menu' : null"
        >
          @if (option.icon) {
            <i slot="start" class="bwi" [ngClass]="option.icon" aria-hidden="true"></i>
          }
          {{ option.label }}
          @if (option.children?.length) {
            <i slot="end" class="bwi bwi-angle-right" aria-hidden="true"></i>
          }
        </button>
      }
    </div>
  }
</bit-menu>
