<label
  class="tw-transition tw-items-start tw-gap-2 tw-select-none tw-mb-0 tw-inline-flex tw-rounded has-[:focus-visible]:tw-ring has-[:focus-visible]:tw-ring-primary-600"
  [ngClass]="[base.formControl().disabled ? 'tw-cursor-auto' : 'tw-cursor-pointer']"
>
  <ng-content></ng-content>
  <!-- minor padding adjustment for visual alignment -->
  <span
    class="tw-inline-flex tw-flex-col tw-pt-[1px]"
    [ngClass]="base.formControl().disabled ? 'tw-text-muted' : 'tw-text-main'"
  >
    <span bitTypography="body2" class="tw-leading-5 tw-font-medium">
      <ng-content select="bit-label"></ng-content>
      @if (base.required) {
        <span class="tw-text-xs tw-font-normal"> ({{ "required" | i18n }})</span>
      }
    </span>
    @if (!base.hasError) {
      <span class="[&_bit-hint]:tw-mt-0 tw-leading-none">
        <ng-content select="bit-hint"></ng-content>
      </span>
    }
  </span>
</label>
@if (base.hasError) {
  <div class="tw-mt-1 tw-text-danger tw-text-xs tw-ms-0.5">
    <i class="bwi bwi-error"></i> {{ base.displayError }}
  </div>
}
