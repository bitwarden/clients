<div class="tw-flex tw-flex-col tw-items-center tw-gap-8 tw-text-center tw-max-w-[491px]">
  <bit-icon-tile
    icon="bwi-check-circle"
    variant="success"
    size="lg"
    ariaLabel="{{ 'paymentSuccessful' | i18n }}"
  ></bit-icon-tile>
  <div class="tw-w-full">
    <h1 bitTypography="h1" class="tw-mb-4">{{ "paymentSuccessful" | i18n }}</h1>
    <p bitTypography="body1" class="tw-m-0 tw-text-fg-body">
      {{ "paymentSuccessfulProcessingMessage" | i18n }}
    </p>
  </div>

  <dl
    class="tw-m-0 tw-flex tw-w-full tw-flex-col tw-gap-2 tw-rounded tw-border tw-border-solid tw-border-secondary-300 tw-p-4 tw-text-left"
  >
    <div class="tw-flex tw-items-center tw-justify-between tw-gap-3">
      <dt bitTypography="body1" class="tw-m-0 tw-text-fg-body-subtle">
        {{ "planPurchased" | i18n }}
      </dt>
      <dd bitTypography="body1" class="tw-m-0 tw-font-medium tw-text-main">
        {{ planNameKey | i18n }}
      </dd>
    </div>
    <div class="tw-flex tw-items-center tw-justify-between tw-gap-3">
      <dt bitTypography="body1" class="tw-m-0 tw-text-fg-body-subtle">{{ "startDate" | i18n }}</dt>
      <dd bitTypography="body1" class="tw-m-0 tw-font-medium tw-text-main">
        {{ startDate | date: "MMMM d, y" }}
      </dd>
    </div>
    <div class="tw-flex tw-items-center tw-justify-between tw-gap-3">
      <dt bitTypography="body1" class="tw-m-0 tw-text-fg-body-subtle">
        {{ "renewalDate" | i18n }}
      </dt>
      <dd bitTypography="body1" class="tw-m-0 tw-font-medium tw-text-main">
        {{ renewalDate | date: "MMMM d, y" }}
      </dd>
    </div>
  </dl>
</div>
