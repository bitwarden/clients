<div
  class="tw-rounded-2xl tw-bg-primary-100 tw-border-primary-600 tw-border-solid tw-border tw-p-4 tw-pt-2 tw-flex tw-flex-col tw-gap-2 tw-mb-4"
>
  <div class="tw-flex tw-justify-between tw-items-start tw-flex-grow">
    <div>
      @if (title()) {
        <h2 bitTypography="h4" class="tw-font-medium !tw-mb-1">{{ title() }}</h2>
      }
      @if (subtitle()) {
        <p class="tw-text-main tw-mb-0" bitTypography="body2" [innerHTML]="subtitle()"></p>
      } @else {
        <ng-content></ng-content>
      }
    </div>
    @if (!persistent()) {
      <button
        type="button"
        bitIconButton="bwi-close"
        size="small"
        (click)="handleDismiss()"
        class="-tw-me-2"
        [label]="'close' | i18n"
      ></button>
    }
  </div>

  @if (buttonText()) {
    <button
      class="tw-w-full"
      bitButton
      type="button"
      buttonType="primary"
      (click)="handleButtonClick($event)"
    >
      {{ buttonText() }}
      @if (buttonIcon()) {
        <i [ngClass]="buttonIcon()" class="bwi tw-ml-1" aria-hidden="true"></i>
      }
    </button>
  }
</div>
