<ng-content select="bit-label"></ng-content>

<input
  #fileInput
  [id]="inputId"
  type="file"
  class="tw-sr-only"
  tabindex="-1"
  [accept]="accept()"
  [multiple]="multiple()"
  (change)="onFileInputChange($event)"
/>

<label
  [attr.for]="inputId"
  class="tw-flex tw-flex-col tw-items-center tw-gap-4 tw-py-10 tw-mt-1 tw-border tw-border-dashed tw-border-border-strong tw-rounded-xl tw-bg-bg-secondary tw-cursor-pointer tw-transition-colors hover:tw-border-primary-600 hover:tw-bg-primary-100"
  [class.tw-border-primary-600]="isDragOver()"
  [class.tw-bg-primary-100]="isDragOver()"
  (dragenter)="onDragEnter($event)"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
>
  <div class="tw-flex tw-flex-col tw-items-center tw-gap-1">
    <span class="tw-text-sm tw-font-medium tw-text-fg-body-subtle">
      {{ "clickToUploadOrDragAndDrop" | i18n }}
    </span>
    <span class="tw-text-xs tw-text-fg-body-subtle">
      {{ "maxFileSizeParam" | i18n: maxFileSize() }}
    </span>
  </div>

  <button
    type="button"
    bitButton
    buttonType="primary"
    size="small"
    (click)="openFileBrowser($event)"
  >
    {{ "chooseFiles" | i18n }}
  </button>
</label>

<ng-content select="bit-hint"></ng-content>
