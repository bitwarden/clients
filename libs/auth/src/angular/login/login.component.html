<!--
  # Table of Contents

    This file contains a single consolidated template for all visual clients.

  # UI States

    PQP Auto-Login flow:
      1. Show PqP login buttons (Google / Microsoft)
      2. After login or if already logged in, show spinner and auto-login
      3. Navigate directly to vault on success
-->

<!-- PQP Auto-Login in Progress (Bitwarden API call) -->
<div
  *ngIf="pqpAutoLoginInProgress"
  class="tw-flex tw-flex-col tw-items-center tw-justify-center tw-py-12 tw-gap-4"
>
  <i class="bwi bwi-spinner bwi-spin bwi-2x tw-text-primary-600" aria-hidden="true"></i>
  <p class="tw-text-lg tw-font-medium tw-text-main">Signing in...</p>
  <p class="tw-text-sm tw-text-muted">Logging you in with PqP Network</p>
</div>

<!-- PQP Login UI -->
<div *ngIf="!pqpAutoLoginInProgress">
  <div
    class="tw-mb-4 tw-p-4 tw-border tw-border-solid tw-border-secondary-300 tw-rounded-lg tw-bg-background-alt"
  >
    <p class="tw-text-sm tw-font-medium tw-mb-3 tw-text-main">Sign in to PqP Network</p>
    <div class="tw-grid tw-gap-2">
      <button
        type="button"
        bitButton
        block
        [buttonType]="pqpNetworkLoggedIn ? 'secondary' : 'primary'"
        (click)="handlePqpGoogleLogin()"
        [disabled]="pqpNetworkLoggedIn"
      >
        <i class="bwi bwi-check tw-mr-1" *ngIf="pqpNetworkLoggedIn" aria-hidden="true"></i>
        {{ pqpNetworkLoggedIn ? "Connected" : "Sign in with Google" }}
      </button>

      <button
        type="button"
        bitButton
        block
        [buttonType]="pqpNetworkLoggedIn ? 'secondary' : 'primary'"
        (click)="handlePqpMicrosoftLogin()"
        [disabled]="pqpNetworkLoggedIn"
      >
        <i class="bwi bwi-check tw-mr-1" *ngIf="pqpNetworkLoggedIn" aria-hidden="true"></i>
        {{ pqpNetworkLoggedIn ? "Connected" : "Sign in with Microsoft" }}
      </button>
    </div>
  </div>

  <!-- Continue button — enabled only after PQP login succeeds -->
  <button
    type="button"
    bitButton
    block
    buttonType="primary"
    (click)="handlePqpContinue()"
    [disabled]="!pqpReady"
  >
    {{ "continue" | i18n }}
  </button>
</div>

<!-- Hidden form (used programmatically by auto-login) -->
<form [bitSubmit]="submit" [formGroup]="formGroup" class="tw-hidden">
  <input type="email" formControlName="email" />
  <input type="password" formControlName="masterPassword" />
  <input type="checkbox" formControlName="rememberEmail" />
</form>
