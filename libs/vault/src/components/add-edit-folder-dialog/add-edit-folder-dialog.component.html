<form [formGroup]="folderForm" [bitSubmit]="submit" bit-dialog id="add-edit-folder">
  @if (backAction) {
    <button
      type="button"
      bitIconButton="bwi-angle-left"
      buttonType="primaryGhost"
      size="default"
      [label]="'back' | i18n"
      (click)="backAction()"
      class="-tw-ms-3"
      data-testid="folder-dialog-back-button"
      bitDialogHeaderStart
    ></button>
  }
  <span bitDialogTitle>
    {{ (variant === "add" ? "newFolder" : "editFolder") | i18n }}
  </span>
  <div bitDialogContent>
    <bit-form-field disableMargin>
      <bit-label>{{ "folderName" | i18n }}</bit-label>
      <input bitInput id="folderName" formControlName="name" type="text" />
      <bit-hint>
        {{ "folderHintText" | i18n }}
      </bit-hint>
    </bit-form-field>
  </div>
  <ng-container bitDialogFooter>
    <button
      #submitBtn
      bitButton
      buttonType="primary"
      type="submit"
      form="add-edit-folder"
      [disabled]="folderForm.invalid"
    >
      {{ "save" | i18n }}
    </button>
    <button bitButton bitDialogClose buttonType="secondary" type="button">
      {{ "cancel" | i18n }}
    </button>

    <button
      *ngIf="variant === 'edit'"
      type="button"
      buttonType="dangerGhost"
      class="tw-ml-auto"
      bitIconButton="bwi-trash"
      [label]="'deleteFolder' | i18n"
      [bitAction]="deleteFolder"
    ></button>
  </ng-container>
</form>
