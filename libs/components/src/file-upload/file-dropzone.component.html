<bit-form-field [control]="formFieldControl">
  <ng-content select="bit-label" ngProjectAs="bit-label" />

  <div bitCustomInput>
    <!-- Drag & drop area. Wrapping <label> (no [for]) triggers the descendant input on click;
       bit-form-field renders the canonical <label [for]> targeting the input via [id]. -->
    <label
      [class]="dropzoneClasses()"
      (dragenter)="onDragEnter($event)"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
    >
      <input
        #fileInput
        [id]="inputId"
        type="file"
        class="tw-sr-only"
        [accept]="accept()"
        [multiple]="multiple()"
        [disabled]="disabled() || null"
        [attr.aria-label]="'clickToUploadOrDragAndDrop' | i18n"
        [attr.aria-describedby]="describedBy()"
        (click)="onInputClick($event)"
        (change)="onInputChange($event)"
        (blur)="onBlur()"
      />

      <div class="tw-flex tw-flex-col tw-items-center tw-gap-1">
        <span
          class="tw-text-sm tw-font-medium"
          [class.tw-text-fg-body-subtle]="!disabled()"
          [class.tw-text-fg-inactive]="disabled()"
        >
          {{ "clickToUploadOrDragAndDrop" | i18n }}
        </span>
        @if (maxFileSize() != null) {
          <span
            class="tw-text-xs"
            [class.tw-text-fg-body-subtle]="!disabled()"
            [class.tw-text-fg-inactive]="disabled()"
          >
            {{ "maxFileSizeParam" | i18n: maxFileSize() }}
          </span>
        }
      </div>

      <button
        type="button"
        bitButton
        buttonType="primary"
        size="small"
        tabindex="-1"
        class="tw-pointer-events-none"
        [disabled]="disabled()"
      >
        {{ "chooseFiles" | i18n }}
      </button>
    </label>

    <span [id]="statusId" class="tw-sr-only">{{ filesUploadedStatus() }}</span>

    <!-- Hint sits between the drop area and the file list; the wrapper owns this layout. -->
    <ng-content select="bit-hint" />

    @if (files().length > 0) {
      <span [id]="listLabelId" class="tw-sr-only">{{ "uploadedFiles" | i18n }}</span>
      <ul [attr.aria-labelledby]="listLabelId" class="tw-list-none tw-p-0 tw-m-0">
        @for (file of files(); track $index) {
          <li class="tw-flex tw-items-center tw-gap-3 tw-py-2 tw-border-b tw-border-border-light">
            <bit-icon-tile icon="bwi-file" variant="subtle" size="sm" />
            <div class="tw-flex tw-flex-col tw-flex-1 tw-min-w-0">
              <bit-file-name [name]="file.name" class="tw-text-sm tw-font-semibold" />
              <span class="tw-text-xs tw-text-muted">{{ formatFileSize(file.size) }}</span>
            </div>
            @if (!disabled()) {
              <button
                #deleteBtn
                type="button"
                bitIconButton="bwi-trash"
                buttonType="dangerGhost"
                size="small"
                [label]="['delete' | i18n, file.name].join(' ')"
                (click)="onRemove(file)"
              ></button>
            }
          </li>
        }
      </ul>
    }
  </div>
</bit-form-field>
