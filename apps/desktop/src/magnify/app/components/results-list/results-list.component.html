<div class="results-wrapper" *ngIf="hasSearched()">
  <div class="results-list" role="listbox">
    <div
      *ngFor="let item of results(); let i = index"
      #resultItem
      class="result-item"
      [class.selected]="i === selectedIndex()"
      role="option"
      [attr.aria-selected]="i === selectedIndex()"
      (click)="itemSelected.emit(item)"
      (mouseenter)="itemHovered.emit(i)"
    >
      <div class="result-icon">
        <img
          *ngIf="item.iconUrl"
          class="result-icon-img"
          [src]="item.iconUrl"
          [alt]="item.name"
          (error)="onImgError($event)"
        />
        <span *ngIf="!item.iconUrl" class="result-icon-initial">
          {{ item.name.charAt(0).toUpperCase() }}
        </span>
      </div>
      <div class="result-text">
        <div class="result-title">{{ item.name }}</div>
        <div class="result-subtitle">{{ item.username }}</div>
      </div>
      <div class="result-actions" *ngIf="i === selectedIndex()">
        <div class="result-action-badge" *ngFor="let action of itemActions">
          <span class="result-action-description">{{ action.description }}</span>
          <span class="result-action-key">{{ getActionLabel(action) }}</span>
        </div>
      </div>
    </div>

    <div class="no-results" *ngIf="results().length === 0">No results found</div>
  </div>
</div>
