name: Lint

on:
  pull_request:
    types: [opened, synchronize]
    branches-ignore:
      - 'l10n_master'
      - 'cf-pages'
    paths-ignore:
      - '.github/workflows/**'
  push:
    branches:
      - 'main'
      - 'rc'
      - 'hotfix-rc-*'
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:
    inputs: {}

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Lint filenames (no capital characters)
        run: |
          find . -type f,d -name "*[[:upper:]]*" \
            ! -path "./node_modules/*" \
            ! -path "./coverage/*" \
            ! -path "*/dist/*" \
            ! -path "*/build/*" \
            ! -path "*/target/*" \
            ! -path "./.git/*" \
            ! -path "*/.DS_Store" \
            ! -path "*/*locales/*" \
            ! -path "./.github/*" \
            ! -path "*/README.md" \
            ! -path "*/Cargo.toml" \
            ! -path "*/Cargo.lock" \
            ! -path "./apps/desktop/macos/*" \
            ! -path "*/CLAUDE.md" \
            ! -path "*/SKILL.md" \
            > tmp.txt
          diff <(sort .github/whitelist-capital-letters.txt) <(sort tmp.txt)

      - name: Get Node Version
        id: retrieve-node-version
        run: |
          NODE_NVMRC=$(cat .nvmrc)
          NODE_VERSION=${NODE_NVMRC/v/''}
          echo "node_version=$NODE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
          node-version: ${{ steps.retrieve-node-version.outputs.node_version }}

      - name: Install Node dependencies
        run: npm ci

      - name: Lint unowned dependencies
        run: npm run lint:dep-ownership

      - name: Lint sdk-internal versions
        run: npm run lint:sdk-internal-versions

      - name: Run linter
        run: npm run lint

  rust:
    name: Rust ${{ matrix.check.name }} (${{ matrix.os }})
    runs-on: ${{ matrix.os || 'ubuntu-24.04' }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14
          - windows-2022
        # Each check maps to `scripts/lint-rust.mjs --only <name>`. `nightly` pulls
        # in the nightly toolchain (fmt, udeps); `cargo_bin` bootstraps cargo-run-bin
        # and caches the tools it builds (sort, udeps, deny).
        check:
          - { name: fmt, nightly: true }
          - { name: clippy }
          - { name: sort, cargo_bin: true }
          - { name: udeps, nightly: true, cargo_bin: true }
          - { name: deny, cargo_bin: true }

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install Rust nightly
        if: matrix.check.nightly
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: nightly
          components: rustfmt

      - name: Check Rust version
        run: rustup --version

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      # Cache cargo-run-bin's built tools (.bin) separately from rust-cache. The
      # tools depend only on their pinned versions (Cargo.toml) and the toolchain,
      # not on Cargo.lock, so this key avoids rust-cache's lockfile rotation. Keyed
      # per check so each one caches only the tools it builds.
      - name: Cache cargo-run-bin tools
        if: matrix.check.cargo_bin
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: apps/desktop/desktop_native/.bin
          key: cargo-bin-${{ runner.os }}-${{ matrix.check.name }}-${{ hashFiles('apps/desktop/desktop_native/Cargo.toml', 'apps/desktop/desktop_native/rust-toolchain.toml') }}
          restore-keys: |
            cargo-bin-${{ runner.os }}-${{ matrix.check.name }}-

      - name: Install cargo-run-bin
        if: matrix.check.cargo_bin
        run: cargo install cargo-run-bin --locked --version 1.7.4

      # lint-rust.mjs runs the cargo-binstall guard (check-no-binstall.mjs) itself
      # before any `cargo bin` invocation, so no separate step is needed here.
      - name: Run lint --only ${{ matrix.check.name }}
        run: node scripts/lint-rust.mjs --only ${{ matrix.check.name }}

  rust-lint:
    name: Rust lint
    runs-on: ubuntu-24.04
    needs: rust
    if: always()
    steps:
      - name: Verify all Rust lint checks passed
        if: ${{ needs.rust.result != 'success' }}
        run: exit 1
