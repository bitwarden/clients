@if (useNewItemDialog()) {
  <button
    bitButton
    buttonType="primary"
    type="button"
    (click)="navigateToNewItemPage()"
    startIcon="bwi-plus"
  >
    {{ "new" | i18n }}
  </button>
} @else {
  <button
    bitButton
    startIcon="bwi-plus"
    [bitMenuTriggerFor]="itemOptions"
    buttonType="primary"
    type="button"
  >
    {{ "new" | i18n }}
  </button>
  <bit-menu #itemOptions>
    @for (menuItem of cipherMenuItems$ | async; track menuItem.type) {
      <a bitMenuItem [routerLink]="['/add-cipher']" [queryParams]="buildQueryParams(menuItem.type)">
        <i [class]="`bwi ${menuItem.icon}`" slot="start" aria-hidden="true"></i>
        {{ menuItem.labelKey | i18n }}
      </a>
    }
    <bit-menu-divider></bit-menu-divider>
    <button startIcon="bwi-folder" type="button" bitMenuItem (click)="openFolderDialog()">
      {{ "folder" | i18n }}
    </button>
  </bit-menu>
}
