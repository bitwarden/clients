<p class="tw-mb-2 tw-text-sm tw-text-muted">{{ "policyStubIpAllowlistHint" | i18n }}</p>
<bit-form-field>
  <bit-label>{{ "policyStubIpAllowlistCidrLabel" | i18n }}</bit-label>
