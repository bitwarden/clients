<ng-select
  [ngModel]="selectedOption()"
  (ngModelChange)="onChange($event)"
  [disabled]="disabled"
  [placeholder]="placeholder()"
  [items]="items()"
  (blur)="onBlur()"
  [labelForId]="labelForId"
  [clearable]="false"
  (close)="onClose()"
  appendTo="body"
  outsideClickEvent="mousedown"
  [keyDownFn]="onKeyDown"
  [attr.aria-label]="selectedOption()?.label ?? placeholder()"
>
  <ng-template ng-option-tmp let-item="item">
    <div class="tw-flex tw-justify-between tw-items-center" [title]="item.label">
      <div class="tw-flex tw-gap-2 tw-items-center">
        @if (item.icon != null) {
          <bit-icon [name]="item.icon" fixedWidth />
        }
        <div class="tw-flex-1 tw-text-ellipsis tw-overflow-hidden">
          {{ item.label }}
        </div>
      </div>
      <div bitTypography="helper">
        {{ item.count }}
      </div>
    </div>
  </ng-template>
</ng-select>
