name: Generate Release Notes
description: Generates per-client release notes by filtering merged PRs by client label and categorizing them.
run-name: Generate Release Notes for ${{ inputs.client }}

on:
  workflow_dispatch:
    inputs:
      client:
        description: "Client name (web, browser, desktop, cli)"
        required: true
        type: choice
        options:
          - web
          - browser
          - desktop
          - cli

jobs:
  generate:
    name: Generate Release Notes
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate release notes
        id: generate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLIENT: ${{ inputs.client }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Parse .github/release.yml into JSON for use by jq
          RELEASE_CONFIG=$(yq -o=json '.changelog' /.github/release.yml)

          echo "Using release config:"
          echo "$RELEASE_CONFIG" | jq .

          # Find the most recent tag for this client
          PREV_TAG=$(git tag -l --sort=-authordate | grep "^${CLIENT}-v" | head -n 1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found for client '${CLIENT}'"
            echo "release-notes=No previous release found." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Previous tag: $PREV_TAG"

          # Get the author date of the previous tag
          PREV_DATE=$(git tag -l --format='%(authordate:iso-strict)' "$PREV_TAG")
          echo "Previous tag date: $PREV_DATE"

          # Query merged PRs with the client label since the previous tag date
          PRS=$(gh pr list \
            --repo "$GH_REPO" \
            --state merged \
            --label "$CLIENT" \
            --search "merged:>=${PREV_DATE}" \
            --json number,title,labels,author \
            --limit 500)

          # Filter and categorize PRs using the release.yml config
          MARKDOWN=$(jq -r -n \
            --argjson config "$RELEASE_CONFIG" \
            --argjson prs "$PRS" '

            ($config.exclude.labels // []) as $exclude_labels |
            ($config.categories // []) as $categories |

            # Filter out PRs with excluded labels
            [ $prs[] | select(.labels | map(.name) | any(. as $l | $exclude_labels | index($l)) | not) ] |

            # Iterate categories in order, assign each PR to first matching category
            . as $filtered_prs |
            reduce ($categories | to_entries[]) as $entry (
              { used: [], sections: [] };
              .used as $used_numbers |
              $entry.value as $cat |
              [
                $filtered_prs[] |
                select(.number as $n | $used_numbers | index($n) | not) |
                select(
                  ($cat.labels | index("*")) or
                  (.labels | map(.name) | any(. as $l | $cat.labels | index($l)))
                )
              ] as $matched |
              .sections += [{ title: $cat.title, prs: $matched }] |
              .used += [ $matched[].number ]
            ) |

            # Render markdown, skip empty sections
            [ .sections[] | select(.prs | length > 0) |
              "## \(.title)\n" + (
                [ .prs[] | "- \(.title) by @\(.author.login) (#\(.number))" ] | join("\n")
              )
            ] | join("\n\n")
          ')

          if [ -z "$MARKDOWN" ]; then
            MARKDOWN="No changes for this release."
          fi

          echo "Generated release notes:"
          echo "$MARKDOWN"

          # Write multiline output
          {
            echo "release-notes<<RELEASE_NOTES_EOF"
            echo "$MARKDOWN"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
