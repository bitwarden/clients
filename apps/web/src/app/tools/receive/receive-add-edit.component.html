<bit-dialog dialogSize="large">
  <ng-container bitDialogTitle>{{
    (isEditMode ? "editReceive" : "newReceive") | i18n
  }}</ng-container>
  <ng-container bitDialogContent>
    <form [formGroup]="form">
      @if (isEditMode) {
        <bit-form-field>
          <bit-label>{{ "sendLink" | i18n }}</bit-label>
          <input bitInput disabled type="text" [value]="receiveLink()" />
          <button
            type="button"
            bitIconButton="bwi-clone"
            bitSuffix
            [label]="'copyLink' | i18n"
            (click)="copyLink()"
          ></button>
        </bit-form-field>
      }
      <bit-form-field>
        <bit-label>{{ "name" | i18n }}</bit-label>
        <input bitInput type="text" formControlName="name" />
      </bit-form-field>
      <bit-form-field>
        <bit-label>{{ "expirationDays" | i18n }}</bit-label>
        <bit-select formControlName="expirationDays">
          @for (option of expirationDayOptions; track option.value) {
            <bit-option [value]="option.value" [label]="option.label"></bit-option>
          }
        </bit-select>
      </bit-form-field>
    </form>
  </ng-container>
  <ng-container bitDialogFooter>
    <button type="button" bitButton buttonType="primary">{{ "generateLink" | i18n }}</button>
    <button type="button" bitButton buttonType="secondary" bitDialogClose>
      {{ "cancel" | i18n }}
    </button>
  </ng-container>
</bit-dialog>
