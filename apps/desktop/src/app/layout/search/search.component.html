<div class="search" *ngIf="state.enabled">
  <input
    type="search"
    [placeholder]="state.placeholderText"
    id="search"
    autocomplete="off"
    [formControl]="searchText"
    appAutofocus
    (keydown.tab)="focusSearchResults($event)"
  />
  <bit-icon name="bwi-search"></bit-icon>
</div>
